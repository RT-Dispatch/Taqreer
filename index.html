<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#070B14">
<title>الإعلام العسكري — الغلاف</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
/* ── TOKENS ── */
:root {
  --gold:#C9A84C; --gold-light:#E8C97E; --gold-dim:#8B6914;
  --gold-glow:rgba(201,168,76,0.18); --gold-line:rgba(201,168,76,0.2);
  --deep:#070B14; --panel:rgba(12,19,34,0.96);
  --text:#EDE8DB; --text-soft:#C4BCA8; --text-dim:#7A8099;
  --border:rgba(201,168,76,0.16); --border-s:rgba(201,168,76,0.38);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-font-smoothing:antialiased}
html,body{height:100%;overflow:hidden;background:var(--deep);font-family:'Cairo',sans-serif;color:var(--text);direction:rtl}

/* ── BG ── */
.bg{position:fixed;inset:0;z-index:0;pointer-events:none}
.bg-radial{position:absolute;inset:0;background:radial-gradient(ellipse 140% 100% at 50% -5%,#152240 0%,transparent 65%),radial-gradient(ellipse 70% 50% at 10% 90%,#0A1830 0%,transparent 55%),var(--deep)}
.bg-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(201,168,76,.035) 1px,transparent 1px),linear-gradient(90deg,rgba(201,168,76,.035) 1px,transparent 1px);background-size:64px 64px;mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black 30%,transparent 100%)}
.bg-orb1{position:absolute;width:min(700px,70vw);height:min(700px,70vw);top:-25%;right:-15%;border-radius:50%;background:radial-gradient(circle,rgba(201,168,76,.1) 0%,transparent 70%);filter:blur(80px)}
.bg-orb2{position:absolute;width:min(500px,50vw);height:min(500px,50vw);bottom:-20%;left:-10%;border-radius:50%;background:radial-gradient(circle,rgba(26,58,106,.25) 0%,transparent 70%);filter:blur(100px)}
.bg-lines{position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.025) 3px,rgba(0,0,0,.025) 4px)}

/* Diagonal accent lines */
.bg-diag{position:absolute;inset:0;overflow:hidden}
.bg-diag::before{content:'';position:absolute;top:0;right:0;width:1px;height:100%;background:linear-gradient(to bottom,transparent,rgba(201,168,76,.15),transparent);transform:translateX(-40vw) rotate(15deg) scaleY(2.5);transform-origin:top center}
.bg-diag::after{content:'';position:absolute;top:0;left:0;width:1px;height:100%;background:linear-gradient(to bottom,transparent,rgba(201,168,76,.08),transparent);transform:translateX(35vw) rotate(-12deg) scaleY(2.5);transform-origin:top center}

/* ── LAYOUT ── */
.page{position:relative;z-index:1;height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:clamp(20px,3vw,48px) clamp(16px,4vw,48px) clamp(80px,10vh,100px)}

/* ── CARD ── */
.card{position:relative;width:100%;max-width:min(860px,96vw);background:var(--panel);border:1px solid var(--border);padding:clamp(40px,6vw,80px) clamp(32px,6vw,80px);text-align:center;box-shadow:0 0 0 1px rgba(0,0,0,.6),0 80px 160px rgba(0,0,0,.55),inset 0 1px 0 rgba(201,168,76,.12),inset 0 -1px 0 rgba(0,0,0,.4);backdrop-filter:blur(4px)}

/* corner brackets */
.card::before,.card::after,.card .c1,.card .c2{content:'';position:absolute;width:clamp(18px,2.5vw,30px);height:clamp(18px,2.5vw,30px);border-color:var(--gold);border-style:solid;opacity:.65}
.card::before{top:clamp(12px,1.8vw,18px);right:clamp(12px,1.8vw,18px);border-width:2px 2px 0 0}
.card::after{bottom:clamp(12px,1.8vw,18px);left:clamp(12px,1.8vw,18px);border-width:0 0 2px 2px}
.card .c1{top:clamp(12px,1.8vw,18px);left:clamp(12px,1.8vw,18px);border-width:2px 0 0 2px}
.card .c2{bottom:clamp(12px,1.8vw,18px);right:clamp(12px,1.8vw,18px);border-width:0 2px 2px 0}

/* top label */
.top-label{display:inline-flex;align-items:center;gap:10px;font-size:clamp(9px,1.1vw,11px);font-weight:700;letter-spacing:clamp(2px,.5vw,5px);color:var(--gold-dim);text-transform:uppercase;margin-bottom:clamp(20px,3vw,36px)}
.top-label::before,.top-label::after{content:'';display:block;width:clamp(24px,4vw,48px);height:1px;background:linear-gradient(90deg,transparent,var(--gold-dim))}
.top-label::after{background:linear-gradient(90deg,var(--gold-dim),transparent)}

/* emblem */
.emblem{font-size:clamp(52px,8vw,96px);line-height:1;margin-bottom:clamp(20px,3vw,36px);filter:drop-shadow(0 0 32px rgba(201,168,76,.45)) drop-shadow(0 0 8px rgba(201,168,76,.2));animation:emblemFloat 5s ease-in-out infinite, emblemGlow 3s ease-in-out infinite alternate}
@keyframes emblemFloat{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-10px) rotate(.5deg)}}
@keyframes emblemGlow{from{filter:drop-shadow(0 0 24px rgba(201,168,76,.3))}to{filter:drop-shadow(0 0 48px rgba(201,168,76,.6))}}

/* title */
.title{font-family:'Amiri',serif;font-size:clamp(28px,5vw,58px);font-weight:700;line-height:1.4;margin-bottom:clamp(6px,1vw,12px)}
.title .hl{color:var(--gold);display:block}

/* separator */
.sep{display:flex;align-items:center;gap:clamp(8px,1.5vw,16px);margin:clamp(20px,3vw,36px) auto;width:min(320px,80%)}
.sep::before,.sep::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--border-s))}
.sep::after{background:linear-gradient(90deg,var(--border-s),transparent)}
.sep-text{font-size:clamp(9px,1.1vw,11px);letter-spacing:3px;color:var(--gold);white-space:nowrap;font-weight:700}

/* meta strip */
.meta{display:flex;justify-content:center;gap:clamp(20px,5vw,60px);flex-wrap:wrap}
.meta-item{display:flex;flex-direction:column;align-items:center;gap:6px}
.meta-label{font-size:clamp(8px,1vw,10px);letter-spacing:clamp(2px,.4vw,4px);color:var(--gold-dim);text-transform:uppercase;font-weight:700}
.meta-value{font-family:'Amiri',serif;font-size:clamp(16px,2.2vw,22px);font-weight:700;color:var(--text)}
.meta-divider{width:1px;height:clamp(32px,5vw,52px);background:linear-gradient(to bottom,transparent,var(--border-s),transparent);align-self:center}

/* Pulse ring */
.emblem-wrap{position:relative;display:inline-block;margin-bottom:clamp(20px,3vw,36px)}
.pulse-ring{position:absolute;inset:-20%;border-radius:50%;border:1px solid rgba(201,168,76,.15);animation:pulseRing 3s ease-out infinite}
.pulse-ring-2{position:absolute;inset:-35%;border-radius:50%;border:1px solid rgba(201,168,76,.08);animation:pulseRing 3s ease-out infinite .8s}
@keyframes pulseRing{0%{opacity:0;transform:scale(.8)}50%{opacity:1}100%{opacity:0;transform:scale(1.15)}}

/* Floating particles */
.particle{position:fixed;width:2px;height:2px;background:var(--gold);border-radius:50%;pointer-events:none;animation:particleFloat linear infinite;opacity:0}
@keyframes particleFloat{0%{opacity:0;transform:translateY(100vh) translateX(0)}10%{opacity:.6}90%{opacity:.3}100%{opacity:0;transform:translateY(-10vh) translateX(var(--drift))}}

/* ── ANIMATIONS ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
.card{animation:scaleIn .8s cubic-bezier(.22,1,.36,1) both}
.top-label{animation:fadeUp .6s ease both;animation-delay:.15s}
.emblem-wrap{animation:fadeUp .7s ease both;animation-delay:.3s}
.title{animation:fadeUp .7s ease both;animation-delay:.45s}
.sep{animation:fadeUp .6s ease both;animation-delay:.6s}
.meta{animation:fadeUp .6s ease both;animation-delay:.75s}

/* ── NAV ── */
.nav{position:fixed;bottom:0;left:0;right:0;z-index:100;height:clamp(60px,8vh,76px);display:flex;align-items:center;justify-content:space-between;padding:0 clamp(14px,4vw,48px);background:linear-gradient(to top,rgba(7,11,20,.98),rgba(7,11,20,.7));border-top:1px solid rgba(201,168,76,.1);backdrop-filter:blur(20px)}
.nav-btn{display:flex;align-items:center;gap:clamp(6px,1vw,10px);background:none;border:1px solid rgba(201,168,76,.18);cursor:pointer;color:var(--text-dim);font-family:'Cairo',sans-serif;font-size:clamp(10px,1.3vw,13px);font-weight:700;letter-spacing:clamp(1px,.3vw,3px);padding:clamp(7px,1vw,10px) clamp(12px,1.8vw,22px);text-decoration:none;transition:all .25s}
.nav-btn:hover{color:var(--gold);border-color:var(--gold);background:rgba(201,168,76,.06)}
.nav-btn.disabled{opacity:.2;pointer-events:none}
.nav-center{display:flex;flex-direction:column;align-items:center;gap:5px}
.nav-counter{font-size:clamp(9px,1.1vw,11px);letter-spacing:3px;color:var(--gold);font-weight:700}
.nav-dots{display:flex;gap:5px}
.dot{width:clamp(18px,2.5vw,28px);height:2px;background:rgba(201,168,76,.2);border-radius:1px;transition:all .4s}
.dot.a{background:var(--gold);width:clamp(28px,4vw,42px)}

@media(max-width:480px){.nav-btn .lbl{display:none}}
</style>
</head>
<body>

<!-- Background -->
<div class="bg">
  <div class="bg-radial"></div>
  <div class="bg-grid"></div>
  <div class="bg-orb1"></div>
  <div class="bg-orb2"></div>
  <div class="bg-lines"></div>
  <div class="bg-diag"></div>
</div>

<!-- Page -->
<div class="page">
  <div class="card">
    <div class="c1"></div>
    <div class="c2"></div>

    <div class="top-label">وثيقة رسمية مرفوعة إلى القيادة الكريمة</div>



    <h1 class="title">
      طلب اعتماد منصب
      <span class="hl">مسؤول الإعلام العسكري</span>
    </h1>

    <div class="sep"><span class="sep-text">بسم الله الرحمن الرحيم</span></div>

    <div class="meta">
      <div class="meta-item">
        <div class="meta-label">عامل التقرير</div>
        <div class="meta-value">فواز الإمام</div>
      </div>
      <div class="meta-divider"></div>
      <div class="meta-item">
        <div class="meta-label">الرقم العسكري</div>
        <div class="meta-value">٥٣١</div>
      </div>
      <div class="meta-divider"></div>
      <div class="meta-item">
        <div class="meta-label">الرتبة</div>
        <div class="meta-value">جندي</div>
      </div>
    </div>
  </div>
</div>

<!-- Nav -->
<nav class="nav">
  <a href="slide2.html" class="nav-btn">
    <span class="lbl">التالي</span>
    <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 10h12M10 4l6 6-6 6"/></svg>
  </a>
  <div class="nav-center">
    <div class="nav-counter">01 / 07</div>
    <div class="nav-dots">
      <div class="dot a"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>
  <span class="nav-btn disabled">
    <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 10H4M10 16l-6-6 6-6"/></svg>
    <span class="lbl">السابق</span>
  </span>
</nav>

<script>
// Floating particles
(function(){
  for(let i=0;i<18;i++){
    const p=document.createElement('div');
    p.className='particle';
    const x=Math.random()*100;
    const dur=8+Math.random()*14;
    const delay=Math.random()*12;
    const drift=(Math.random()-0.5)*80+'px';
    p.style.cssText=`left:${x}%;--drift:${drift};animation-duration:${dur}s;animation-delay:${delay}s`;
    document.body.appendChild(p);
  }
})();
</script>
</body>
</html>
